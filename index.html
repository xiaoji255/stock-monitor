<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 股票红绿灯 · 诊断版</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:system-ui,-apple-system,sans-serif; background:#0f0f1a; color:#e0e0e0; padding:16px; }
        .card { background:#1a1a2e; border-radius:12px; padding:14px; margin-bottom:12px; border:1px solid #2a2a3e; }
        input { width:100%; padding:12px; border-radius:10px; border:1px solid #2a2a3e; background:#0f0f1a; color:#fff; font-size:1rem; margin:6px 0; }
        button { width:100%; padding:12px; background:#5352ed; color:#fff; border:none; border-radius:10px; font-weight:bold; font-size:1rem; margin:4px 0; }
        .log { background:#000; color:#0f0; padding:10px; border-radius:8px; font-family:monospace; font-size:0.75rem; max-height:300px; overflow-y:auto; white-space:pre-wrap; }
        .ok { color:#2ed573; } .err { color:#ff4757; } .info { color:#ffa502; }
    </style>
</head>
<body>
    <h2 style="margin-bottom:12px;">📈 诊断模式</h2>

    <div class="card">
        <div style="font-weight:bold;margin-bottom:6px;">🔍 输入代码测试</div>
        <input type="text" id="codeInput" placeholder="如 600519" value="600519">
        <button onclick="testCode()">测试</button>
        <div id="testResult" style="margin-top:8px;"></div>
    </div>

    <div class="card">
        <div style="font-weight:bold;margin-bottom:6px;">📋 请求日志</div>
        <button onclick="clearLog()" style="width:auto;padding:6px 14px;font-size:0.8rem;">清空</button>
        <div class="log" id="logArea"></div>
    </div>

<script>
const logArea = document.getElementById('logArea');
function log(msg, type='info'){
    const t = new Date().toLocaleTimeString();
    const cls = type==='ok'?'ok':type==='err'?'err':'info';
    logArea.innerHTML += `<span class="${cls}">[${t}] ${msg}</span>\n`;
    logArea.scrollTop = logArea.scrollHeight;
}
function clearLog(){ logArea.innerHTML=''; }

async function testCode(){
    const code = document.getElementById('codeInput').value.trim();
    document.getElementById('testResult').innerHTML = '';
    clearLog();
    log('开始测试: '+code, 'info');

    // 测试1：新浪行情
    log('测试1: 新浪JSONP行情...', 'info');
    try{
        const result = await testSinaAPI(code);
        log('✅ 新浪行情成功: '+result.name+' 价格:'+result.price, 'ok');
        document.getElementById('testResult').innerHTML = `
            <div style="background:rgba(46,213,115,0.1);padding:10px;border-radius:8px;">
                <b>${result.name}</b> 价格:${result.price.toFixed(2)} 涨幅:${result.changePercent.toFixed(2)}%
            </div>`;
    }catch(e){
        log('❌ 新浪行情失败: '+e.message, 'err');
        document.getElementById('testResult').innerHTML = `<div style="color:#ff4757;">新浪行情失败: ${e.message}</div>`;
    }

    // 测试2：腾讯K线
    log('测试2: 腾讯K线JSONP...', 'info');
    try{
        const kl = await testTencentAPI(code);
        log('✅ 腾讯K线成功: '+kl.length+'根K线', 'ok');
    }catch(e){
        log('❌ 腾讯K线失败: '+e.message, 'err');
    }

    // 测试3：东方财富API
    log('测试3: 东方财富fetch...', 'info');
    try{
        const name = await testEastmoneyAPI(code);
        log('✅ 东方财富成功: '+name, 'ok');
    }catch(e){
        log('❌ 东方财富失败: '+e.message, 'err');
    }

    log('测试完成', 'info');
}

// 新浪JSONP测试
function testSinaAPI(code){
    return new Promise((resolve, reject)=>{
        const fullCode = code.startsWith('6')?'sh'+code:'sz'+code;
        const url = `https://hq.sinajs.cn/list=${fullCode}`;
        log('请求URL: '+url, 'info');
        const cb = '_sina_'+Date.now();
        window[cb] = function(data){
            try{
                const inner = (typeof data==='string')?data.split('"')[1]:'';
                if(!inner) throw new Error('无数据');
                const p = inner.split(',');
                resolve({
                    name:p[0], price:parseFloat(p[3]), changePercent:((parseFloat(p[3])-parseFloat(p[2]))/parseFloat(p[2])*100)
                });
            }catch(e){ reject(e); }
            delete window[cb];
        };
        const s = document.createElement('script');
        s.src = url;
        s.onerror = ()=>reject(new Error('网络错误'));
        setTimeout(()=>reject(new Error('超时')), 8000);
        document.head.appendChild(s);
    });
}

// 腾讯K线JSONP测试
function testTencentAPI(code){
    return new Promise((resolve, reject)=>{
        const fullCode = (code.startsWith('6')?'sh':'sz')+code;
        const url = `https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?param=${fullCode},day,,,10,qfq`;
        log('请求URL: '+url, 'info');
        const cb = '_tencent_'+Date.now();
        window[cb] = function(data){
            try{
                const kls = data.data[fullCode].qfqday || data.data[fullCode].day;
                resolve(kls);
            }catch(e){ reject(e); }
            delete window[cb];
        };
        const s = document.createElement('script');
        s.src = url + '&callback='+cb;
        s.onerror = ()=>reject(new Error('网络错误'));
        setTimeout(()=>reject(new Error('超时')), 8000);
        document.head.appendChild(s);
    });
}

// 东方财富fetch测试
async function testEastmoneyAPI(code){
    const pure = code.replace(/[^0-9]/g,'');
    const secid = (pure.startsWith('6')?'1.':'0.')+pure;
    const url = `https://push2.eastmoney.com/api/qt/stock/get?secid=${secid}&fields=f58`;
    log('请求URL: '+url, 'info');
    const resp = await fetch(url, {headers:{'Referer':'https://quote.eastmoney.com/'}});
    const data = await resp.json();
    return data.data.f58;
}

// 初始自动测试
log('🟢 诊断模式已启动', 'ok');
log('点击"测试"按钮开始', 'info');
</script>
</body>
</html>
