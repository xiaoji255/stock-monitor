<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>📈 股票红绿灯 · 最终版</title>
    <style>
        :root { --bg: #0f0f1a; --card: #1a1a2e; --text: #e0e0e0; --sub: #999; --red: #ff4757; --green: #2ed573; --yellow: #ffa502; --border: #2a2a3e; --accent: #5352ed; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 70px; }
        .header { position: sticky; top:0; z-index:100; background: var(--bg); padding: 12px 16px 6px; border-bottom:1px solid var(--border); }
        .header h1 { font-size: 1rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .tabs { display: flex; gap: 4px; }
        .tab-btn { flex: 1; padding: 9px 0; border: none; background: transparent; color: var(--sub); font-weight: 600; font-size: 0.82rem; border-radius: 10px 10px 0 0; transition: all 0.2s; cursor: pointer; }
        .tab-btn.active { color: #fff; background: var(--card); }
        .panel { display: none; padding: 14px 12px; animation: fadeIn 0.2s; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
        .card-title { font-size: 0.75rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        input, select { width: 100%; padding: 11px; margin: 4px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: #fff; font-size: 0.9rem; }
        button { width: 100%; padding: 11px; margin: 4px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn-sm { width: auto; padding: 6px 14px; font-size: 0.78rem; display: inline-block; }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; }
        .tag-red { background: rgba(255,71,87,0.2); color: var(--red); }
        .tag-green { background: rgba(46,213,115,0.2); color: var(--green); }
        .tag-yellow { background: rgba(255,165,2,0.2); color: var(--yellow); }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.75rem; }
        .grid2 .lbl { color: var(--sub); }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .idx-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 6px 0; }
        .idx-card { flex: 0 0 auto; min-width: 82px; background: var(--bg); border-radius: 10px; padding: 10px; text-align: center; border: 1px solid var(--border); }
        .idx-card .name { font-size: 0.62rem; color: var(--sub); }
        .idx-card .price { font-size: 0.88rem; font-weight: 700; }
        .idx-card .change { font-size: 0.65rem; font-weight: 600; }
        .result-box { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 10px; margin: 6px 0; border-left: 3px solid var(--accent); font-size: 0.8rem; }
        .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 18px; border-radius: 18px; font-size: 0.78rem; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .progress { font-size: 0.7rem; color: var(--sub); margin: 6px 0; }
    </style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="header">
    <h1>📈 股票红绿灯</h1>
    <div class="tabs">
        <button class="tab-btn active" data-tab="analyze">🚦 分析</button>
        <button class="tab-btn" data-tab="market">🔥 市场</button>
        <button class="tab-btn" data-tab="pick">📈 选股</button>
    </div>
</div>

<!-- ══════════ 分析面板 ══════════ -->
<div class="panel active" id="panel-analyze">
    <div class="card">
        <div class="card-title">🔍 单股分析（股票/ETF/可转债）</div>
        <input type="text" id="codeInput" placeholder="输入代码：600519 / 000001 / 510050" autocomplete="off">
        <button class="btn-primary" onclick="analyzeStock()">开始分析</button>
        <div id="analyzeResult" style="margin-top:10px;"></div>
    </div>
    <div class="card">
        <div class="card-title">🔔 定时监测</div>
        <input type="text" id="monitorCodeInput" placeholder="添加监测代码">
        <button class="btn-primary btn-sm" onclick="addMonitor()">添加</button>
        <div id="monitorList" style="margin: 8px 0;"></div>
        <div style="display:flex; gap: 8px; align-items: center;">
            <button class="btn-primary btn-sm" id="startMonitorBtn" onclick="startMonitor()">▶ 开启通知</button>
            <span style="font-size:0.7rem; color:var(--sub);" id="monitorStatus">未启动</span>
        </div>
    </div>
</div>

<!-- ══════════ 市场面板 ══════════ -->
<div class="panel" id="panel-market">
    <div class="card">
        <div class="card-title">🌍 全球指数 <button class="btn-outline btn-sm" onclick="loadIndexes()">刷新</button></div>
        <div class="idx-scroll" id="indexArea">加载中...</div>
    </div>
    <div class="card">
        <div class="card-title">🔥 行业板块 TOP15 <button class="btn-outline btn-sm" onclick="loadSectors()">刷新</button></div>
        <div id="sectorArea" style="max-height:350px; overflow-y:auto;">加载中...</div>
    </div>
</div>

<!-- ══════════ 选股面板 ══════════ -->
<div class="panel" id="panel-pick">
    <div class="card">
        <div class="card-title">📋 全市场扫描（市值>100亿 & 股价≤150元）</div>
        <button class="btn-primary" id="scanBtn" onclick="startFullScan()">🔍 开始扫描</button>
        <button class="btn-outline" id="stopScanBtn" onclick="stopScan()" style="display:none;">⏹ 停止</button>
        <div class="progress" id="scanProgress"></div>
        <div id="scanResult"></div>
    </div>
    <div class="card">
        <div class="card-title">📊 跟踪列表</div>
        <button class="btn-outline btn-sm" onclick="showTrackList()">查看列表</button>
        <div id="trackListArea" style="margin-top:8px;"></div>
    </div>
    <div class="card">
        <div class="card-title">📈 复盘</div>
        <button class="btn-outline btn-sm" onclick="reviewPicks()">查看历史表现</button>
        <div id="reviewResult" style="margin-top:8px;"></div>
    </div>
</div>

<script>
(function() {
    // ======================= 工具函数 =======================
    const $ = s => document.querySelector(s);
    function toast(msg) { const t = $('#toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._id); t._id = setTimeout(() => t.classList.remove('show'), 2000); }

    // ======================= 网络请求（带代理回退） =======================
    const DIRECT_API = 'https://push2.eastmoney.com/api/qt';
    const KLINE_API = 'https://push2his.eastmoney.com/api/qt/stock/kline/get';
    const CORS_PROXY = 'https://api.allorigins.win/raw?url=';
    async function fetchWithProxy(url, timeout = 12000) {
        try {
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), timeout);
            const resp = await fetch(url, { headers: { 'Accept': 'application/json', 'Referer': 'https://quote.eastmoney.com/' }, signal: ctrl.signal });
            clearTimeout(timer);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            return await resp.json();
        } catch (e) {
            // 直接请求失败，尝试 CORS 代理
            const ctrl2 = new AbortController();
            const timer2 = setTimeout(() => ctrl2.abort(), timeout + 5000);
            const resp2 = await fetch(CORS_PROXY + encodeURIComponent(url), { signal: ctrl2.signal });
            clearTimeout(timer2);
            if (!resp2.ok) throw new Error('代理请求失败');
            return await resp2.json();
        }
    }

    // ======================= 证券代码解析 =======================
    function getSecid(raw) {
        raw = raw.trim().toLowerCase();
        if (raw.startsWith('sh')) return '1.' + raw.slice(2);
        if (raw.startsWith('sz')) return '0.' + raw.slice(2);
        const pure = raw.replace(/[^0-9]/g, '');
        if (pure.length !== 6) throw new Error('请输入6位数字代码');
        return (pure.startsWith('6') || pure.startsWith('9')) ? '1.' + pure : '0.' + pure;
    }

    // ======================= 数据获取 =======================
    async function getQuote(rawCode) {
        const secid = getSecid(rawCode);
        const data = await fetchWithProxy(`${DIRECT_API}/stock/get?secid=${secid}&fields=f43,f44,f45,f46,f47,f48,f57,f58,f60,f116,f162,f167,f168,f169,f170`);
        if (!data || !data.data || !data.data.f58) throw new Error('未找到该证券');
        const d = data.data;
        return {
            code: d.f57 || rawCode,
            name: d.f58,
            price: d.f43 / 100,
            open: d.f46 / 100,
            preClose: d.f60 / 100,
            high: d.f44 / 100,
            low: d.f45 / 100,
            volume: d.f47,
            turnover: d.f168 / 100,
            changePercent: d.f170 / 100
        };
    }

    async function getKline(rawCode, count = 200) {
        const secid = getSecid(rawCode);
        const data = await fetchWithProxy(`${KLINE_API}?secid=${secid}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57&klt=101&fqt=1&end=20500101&lmt=${count}`);
        if (!data || !data.data || !data.data.klines) throw new Error('K线获取失败');
        return data.data.klines.map(l => {
            const p = l.split(',');
            return { date: p[0], open: +p[1], close: +p[2], high: +p[3], low: +p[4], volume: +p[5] };
        });
    }

    // ======================= 技术指标 =======================
    function SMA(arr, n) { const r = []; let s = 0; for (let i = 0; i < arr.length; i++) { s += arr[i]; if (i >= n - 1) { r.push(s / n); s -= arr[i - n + 1]; } else r.push(null); } return r; }
    function RSI(kl, n = 14) {
        const c = kl.map(k => k.close), g = [], l = [];
        for (let i = 1; i < c.length; i++) { const d = c[i] - c[i - 1]; g.push(d > 0 ? d : 0); l.push(d < 0 ? -d : 0); }
        let ag = g.slice(0, n).reduce((a, b) => a + b, 0) / n, al = l.slice(0, n).reduce((a, b) => a + b, 0) / n;
        const res = [100 - 100 / (1 + ag / (al || 1e-10))];
        for (let i = n; i < g.length; i++) { ag = (ag * (n - 1) + g[i]) / n; al = (al * (n - 1) + l[i]) / n; res.push(100 - 100 / (1 + ag / (al || 1e-10))); }
        return res;
    }
    function BIAS(kl, n = 20) { const c = kl.map(k => k.close), m = SMA(c, n); return c.map((v, i) => m[i] ? ((v - m[i]) / m[i] * 100) : null); }
    function MACD(kl, s = 12, l = 26, m = 9) {
        const c = kl.map(k => k.close);
        const EMA = (arr, n) => { const r = [], k = 2 / (n + 1); let prev = arr.slice(0, n).reduce((a, b) => a + b, 0) / n; for (let i = 0; i < arr.length; i++) { if (i < n - 1) { r.push(null); continue; } if (i === n - 1) r.push(prev); else { prev = arr[i] * k + prev * (1 - k); r.push(prev); } } return r; };
        const emaS = EMA(c, s), emaL = EMA(c, l);
        const dif = c.map((_, i) => (i >= l - 1 && emaS[i] && emaL[i]) ? emaS[i] - emaL[i] : null);
        const valid = dif.filter(v => v !== null);
        const deaVals = EMA(valid, m);
        const dea = new Array(dif.length).fill(null);
        let di = 0;
        for (let i = 0; i < dif.length; i++) if (dif[i] !== null && di < deaVals.length) dea[i] = deaVals[di++];
        return { dif, dea };
    }

    // ======================= 红绿灯分析 =======================
    function analyzeSignal(kl) {
        if (kl.length < 60) return { conc: '⚪ 数据不足', reds: [], greens: [], rsi: '--', bias: '--' };
        const closes = kl.map(k => k.close), last = kl[kl.length - 1], prev = kl[kl.length - 2];
        const dc = (last.close - prev.close) / prev.close * 100;
        const ma5 = SMA(closes, 5), ma20 = SMA(closes, 20), ma60 = SMA(closes, 60);
        const rv = RSI(kl, 14), bv = BIAS(kl, 20), md = MACD(kl);
        const lr = rv[rv.length - 1], lb = bv[bv.length - 1];
        const ldif = md.dif[md.dif.length - 1], ldea = md.dea[md.dea.length - 1];
        const reds = [], greens = [];

        if (dc > 3) reds.push(`前日涨幅过大(${dc.toFixed(2)}%)`);
        const c5 = kl.length >= 6 ? (last.close - kl[kl.length - 6].close) / kl[kl.length - 6].close * 100 : 0;
        if (c5 > 10) reds.push(`近5日涨幅过大(${c5.toFixed(2)}%)`);
        if (lb !== null && lb > 8) reds.push(`乖离率偏高(${lb.toFixed(2)}%)`);
        if (lr !== null && lr > 75) reds.push(`RSI超买(${lr.toFixed(1)})`);
        if (ma60[ma60.length - 1] && ma60[ma60.length - 6] && ma60[ma60.length - 1] < ma60[ma60.length - 6]) reds.push('MA60趋势向下');
        const body = Math.abs(last.close - last.open), us = last.high - Math.max(last.close, last.open);
        if (us > body * 2 && body > 0 && last.close < prev.close) reds.push('长上影冲高回落');

        if (ma5[ma5.length - 1] > ma20[ma20.length - 1] && ma20[ma20.length - 1] > ma60[ma60.length - 1]) greens.push('均线多头排列');
        if (lr !== null && lr >= 30 && lr <= 60) greens.push('RSI健康(30-60)');
        if (ldif !== null && ldea !== null && ldif > ldea) greens.push('MACD多头');
        if (lb !== null && lb >= -5 && lb <= 3) greens.push('乖离率合理');
        const vol5 = SMA(kl.map(k => k.volume), 5);
        if (vol5[vol5.length - 1] && kl[kl.length - 1].volume > vol5[vol5.length - 1] * 1.2 && last.close > last.open) greens.push('放量上涨');

        let conc;
        if (reds.length > 0) conc = '🔴 不建议买入';
        else if (greens.length >= 4) conc = '🟢 满足买入条件';
        else conc = '🟡 继续观望';
        return { conc, reds, greens, rsi: lr?.toFixed(1) || '--', bias: lb?.toFixed(2) || '--' };
    }

    // ======================= 分析面板 UI =======================
    async function analyzeStock() {
        const code = $('#codeInput').value.trim();
        if (!code) return toast('请输入代码');
        $('#analyzeResult').innerHTML = '⏳ 分析中...';
        try {
            const quote = await getQuote(code);
            const kl = await getKline(code, 200);
            const sig = analyzeSignal(kl);
            const cls = quote.changePercent >= 0 ? 'tag-red' : 'tag-green';
            const sgn = quote.changePercent >= 0 ? '+' : '';
            $('#analyzeResult').innerHTML = `
                <div style="margin-bottom:6px;"><b>${quote.name}</b> (${quote.code})</div>
                <div style="font-size:2.2rem; font-weight:800;">${quote.price.toFixed(2)}</div>
                <span class="tag ${cls}">${sgn}${quote.changePercent.toFixed(2)}%</span>
                <div class="grid2" style="margin-top:10px;">
                    <div><span class="lbl">今开</span> ${quote.open.toFixed(2)}</div>
                    <div><span class="lbl">昨收</span> ${quote.preClose.toFixed(2)}</div>
                    <div><span class="lbl">最高</span> ${quote.high.toFixed(2)}</div>
                    <div><span class="lbl">最低</span> ${quote.low.toFixed(2)}</div>
                    <div><span class="lbl">成交量</span> ${(quote.volume/10000).toFixed(1)}万手</div>
                    <div><span class="lbl">RSI(14)</span> ${sig.rsi}</div>
                </div>
                <div style="margin-top:12px; font-size:1.1rem; font-weight:700;">${sig.conc}</div>
                ${sig.reds.length ? `<div style="color:var(--red); font-size:0.78rem;">⚠️ ${sig.reds.join(' | ')}</div>` : ''}
                ${sig.greens.length ? `<div style="color:var(--green); font-size:0.78rem;">✅ ${sig.greens.join(' | ')}</div>` : ''}
                <div style="margin-top:8px; font-size:0.6rem; color:var(--sub);">数据来源：东方财富（代理回退已启用）</div>
            `;
        } catch (e) {
            $('#analyzeResult').innerHTML = `<div style="color:var(--red);">❌ ${e.message}<br><small>请检查代码或切换网络后重试</small></div>`;
        }
    }

    // ======================= 定时监测 =======================
    const MONITOR_KEY = 'monitor_list_v8';
    let monitorList = [];
    let monitorTimer = null;
    function loadMonitor() { try { monitorList = JSON.parse(localStorage.getItem(MONITOR_KEY) || '[]'); } catch(e) { monitorList = []; } renderMonitor(); }
    function saveMonitor() { localStorage.setItem(MONITOR_KEY, JSON.stringify(monitorList)); }
    function renderMonitor() {
        const list = $('#monitorList');
        list.innerHTML = monitorList.length ? monitorList.map((m, i) => `<div class="row"><span>${m.name} (${m.code})</span><button class="btn-outline btn-sm" onclick="removeMonitor(${i})">移除</button></div>`).join('') : '<div style="font-size:0.7rem; color:var(--sub);">暂无监测</div>';
    }
    window.removeMonitor = (i) => { monitorList.splice(i, 1); saveMonitor(); renderMonitor(); toast('已移除'); };
    async function addMonitor() {
        const code = $('#monitorCodeInput').value.trim();
        if (!code) return toast('请输入代码');
        try {
            const q = await getQuote(code);
            if (monitorList.find(m => m.code === q.code)) return toast('已在列表中');
            monitorList.push({ code: q.code, name: q.name });
            saveMonitor();
            renderMonitor();
            toast('已添加 ' + q.name);
        } catch (e) { toast('添加失败: ' + e.message); }
    }
    function startMonitor() {
        if (monitorList.length === 0) return toast('请先添加监测股票');
        if (!('Notification' in window)) return toast('浏览器不支持通知');
        if (Notification.permission === 'default') { Notification.requestPermission().then(p => { if (p === 'granted') startMonitorInternal(); else toast('通知权限被拒绝'); }); }
        else startMonitorInternal();
    }
    function startMonitorInternal() {
        if (monitorTimer) return;
        monitorTimer = setInterval(async () => {
            for (const m of monitorList) {
                try {
                    const kl = await getKline(m.code, 200);
                    const sig = analyzeSignal(kl);
                    if (sig.conc.includes('🟢')) {
                        new Notification(`🟢 ${m.name} 买入信号`, { body: `当前可能满足买入条件，请及时检查` });
                        toast(`🟢 ${m.name} 买入机会`);
                    }
                } catch (e) {}
            }
        }, 60000);
        $('#monitorStatus').textContent = '监测中（60秒/次）';
        toast('监测已启动，有信号会通知');
    }
    loadMonitor();

    // ======================= 市场面板 =======================
    async function loadIndexes() {
        const idxs = [
            { id: '1.000001', name: '上证' }, { id: '0.399001', name: '深证' }, { id: '0.399006', name: '创业板' },
            { id: '1.000688', name: '科创50' }, { id: '100.DJIA', name: '道琼斯' }, { id: '100.NDX', name: '纳斯达克' }
        ];
        let html = '';
        for (const i of idxs) {
            try {
                const data = await fetchWithProxy(`${DIRECT_API}/stock/get?secid=${i.id}&fields=f43,f170,f58`, 6000);
                if (data && data.data) {
                    const d = data.data, p = d.f43 / 100, chg = d.f170 / 100, color = chg >= 0 ? 'var(--red)' : 'var(--green)';
                    html += `<div class="idx-card"><div class="name">${d.f58 || i.name}</div><div class="price" style="color:${color}">${p.toFixed(2)}</div><div class="change" style="color:${color}">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%</div></div>`;
                }
            } catch (e) {}
        }
        $('#indexArea').innerHTML = html || '加载失败，请点击刷新';
    }
    async function loadSectors() {
        try {
            const data = await fetchWithProxy(`https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=15&po=1&np=1&fltt=2&invt=2&fid=f3&fs=m:90+t:2&fields=f2,f3,f14`);
            if (data && data.data && data.data.diff) {
                let html = '';
                data.data.diff.forEach(d => {
                    const chg = d.f3, color = chg >= 0 ? 'var(--red)' : 'var(--green)';
                    html += `<div class="row"><span>${d.f14}</span><span style="color:${color};">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%</span></div>`;
                });
                $('#sectorArea').innerHTML = html;
            }
        } catch (e) { $('#sectorArea').innerHTML = '加载失败，请点击刷新'; }
    }

    // ======================= 全市场扫描 =======================
    let scanAbort = false;
    async function startFullScan() {
        scanAbort = false;
        $('#scanBtn').style.display = 'none';
        $('#stopScanBtn').style.display = 'block';
        $('#scanProgress').textContent = '正在获取股票列表...';
        let allStocks = [];
        for (let page = 1; page <= 8; page++) {
            if (scanAbort) break;
            try {
                const data = await fetchWithProxy(`https://push2.eastmoney.com/api/qt/clist/get?pn=${page}&pz=400&po=1&np=1&fltt=2&invt=2&fid=f3&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23&fields=f2,f3,f12,f14,f20`);
                if (data && data.data && data.data.diff) {
                    const filtered = data.data.diff.filter(d => d.f2 / 100 <= 150 && d.f20 >= 100e8);
                    allStocks.push(...filtered.map(d => ({ code: d.f12, name: d.f14, price: d.f2 / 100, chg: d.f3 })));
                }
            } catch (e) {}
            await new Promise(r => setTimeout(r, 300));
        }
        if (scanAbort) { resetScan(); return; }
        const unique = Array.from(new Map(allStocks.map(s => [s.code, s])).values());
        $('#scanProgress').textContent = `共 ${unique.length} 只符合条件，开始检测信号...`;
        let candidates = [];
        for (let i = 0; i < unique.length; i++) {
            if (scanAbort) break;
            const s = unique[i];
            $('#scanProgress').textContent = `检测 ${i + 1}/${unique.length} ... ${s.name}`;
            try {
                const kl = await getKline(s.code, 200);
                const sig = analyzeSignal(kl);
                if (sig.conc.includes('🟢')) candidates.push({ ...s, rsi: sig.rsi });
            } catch (e) {}
            await new Promise(r => setTimeout(r, 150));
        }
        if (scanAbort) { resetScan(); return; }
        let html = candidates.length === 0 ? '<div style="text-align:center;">当前没有符合买入条件的股票</div>' : '';
        candidates.sort((a, b) => a.price - b.price);
        candidates.forEach(c => {
            html += `<div class="result-box"><b>${c.name}</b> (${c.code}) 价格:${c.price.toFixed(2)} 涨幅:${c.chg.toFixed(2)}% RSI:${c.rsi}</div>`;
        });
        $('#scanResult').innerHTML = html;
        resetScan();
    }
    function stopScan() { scanAbort = true; }
    function resetScan() { $('#scanBtn').style.display = 'block'; $('#stopScanBtn').style.display = 'none'; $('#scanProgress').textContent = ''; }

    // ======================= 跟踪与复盘 =======================
    const TREND_KEY = 'trend_picks_v8';
    function getPicks() { try { return JSON.parse(localStorage.getItem(TREND_KEY) || '[]'); } catch(e) { return []; } }
    function savePicks(p) { localStorage.setItem(TREND_KEY, JSON.stringify(p)); }
    function showTrackList() {
        const picks = getPicks();
        const tracking = picks.filter(p => !p.buyDate);
        const holding = picks.filter(p => p.buyDate);
        let html = '';
        if (tracking.length) { html += '<div style="font-weight:bold; margin-bottom:4px;">🔍 待买入</div>'; tracking.forEach(p => html += `<div class="result-box">${p.name}(${p.code}) 推荐价:${p.price} <button class="btn-outline btn-sm" onclick="markBought('${p.id}')">已买入</button></div>`); }
        if (holding.length) { html += '<div style="font-weight:bold; margin-bottom:4px;">📌 已买入</div>'; holding.forEach(p => html += `<div class="result-box">${p.name}(${p.code}) 买入价:${p.buyPrice} 推荐价:${p.price}</div>`); }
        if (!html) html = '<div style="text-align:center; color:var(--sub);">暂无跟踪股票</div>';
        $('#trackListArea').innerHTML = html;
    }
    window.markBought = (id) => {
        const picks = getPicks();
        const p = picks.find(x => x.id == id);
        if (!p) return;
        const price = prompt('请输入实际买入价格', p.price);
        if (!price || isNaN(+price)) return;
        p.buyPrice = parseFloat(price);
        p.buyDate = new Date().toISOString().slice(0, 10);
        savePicks(picks);
        showTrackList();
        toast('已记录买入');
    };
    async function reviewPicks() {
        const picks = getPicks();
        if (picks.length === 0) return toast('暂无记录');
        let html = '';
        for (const p of picks) {
            try {
                if (!p.lastPrice) { const q = await getQuote(p.code); p.lastPrice = q.price; p.change = ((q.price - p.price) / p.price * 100); }
            } catch (e) {}
            const c = p.change, color = c >= 0 ? 'var(--red)' : 'var(--green)';
            html += `<div class="result-box">${p.name}(${p.code}) 推荐价:${p.price} 现价:${p.lastPrice || '--'} <span style="color:${color}">${c !== undefined ? c.toFixed(2) + '%' : ''}</span></div>`;
        }
        savePicks(picks);
        $('#reviewResult').innerHTML = html;
    }

    // ======================= 导航 =======================
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            $(`#panel-${this.dataset.tab}`).classList.add('active');
            if (this.dataset.tab === 'market') { loadIndexes(); loadSectors(); }
        });
    });

    // 初始加载
    loadIndexes(); loadSectors(); showTrackList();
})();
</script>
</body>
</html>
